version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - copyloopvar
    - nolintlint
    - prealloc
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: var-naming
        - name: indent-error-flow
        - name: errorf
        - name: error-return
        - name: error-strings
        - name: receiver-naming
        - name: unused-parameter
          disabled: true
    staticcheck:
      checks:
        - all
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
  exclusions:
    rules:
      # Tests can be loose about error wrapping and unused params.
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - revive
      # The lint job runs on Linux, where syscall.Stat_t.Dev / Ino are
      # already uint64, so unconvert flags the casts as redundant. They
      # are required on macOS (int32) — keep the file build-portable.
      - path: internal/goutils/fileid/fileid_unix\.go
        linters:
          - unconvert

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lizzary/filecat-go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
